name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-targets

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test --lib --all

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Start test infrastructure
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Wait for ScyllaDB to be fully ready
        run: |
          echo "Waiting for ScyllaDB to accept CQL connections..."
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.test.yml exec -T scylladb-test cqlsh -e "SELECT now() FROM system.local" 2>/dev/null; then
              echo "ScyllaDB is ready."
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 5
          done
          echo "ScyllaDB never became ready"
          exit 1

      - name: Run integration tests
        run: cargo test --tests -p lumiere-server
        env:
          LUMIERE_ENV: test

      - name: Stop test infrastructure
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [check, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t lumiere-server:test .

      - name: Verify image size
        run: |
          SIZE=$(docker image inspect lumiere-server:test --format='{{.Size}}')
          echo "Image size: $((SIZE / 1024 / 1024)) MB"
